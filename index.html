<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DM Export</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fafafa;color:#262626;padding:16px;display:flex;justify-content:center;}
.card{max-width:500px;width:100%;background:#fff;border-radius:16px;border:1px solid #dbdbdb;padding:24px;margin-top:30px;}
h1{text-align:center;font-size:22px;font-weight:700;}
.sub{text-align:center;color:#8e8e8e;font-size:13px;margin:4px 0 20px;}
label{font-size:13px;font-weight:600;color:#555;display:block;margin-top:14px;}
input{width:100%;padding:11px 14px;border:1px solid #dbdbdb;border-radius:10px;font-size:14px;outline:none;margin-top:5px;}
input:focus{border-color:#0095f6;}
.btn{width:100%;padding:14px;background:#0095f6;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:18px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-sec{background:#fff;color:#0095f6;border:1px solid #dbdbdb;margin-top:12px;}
.bar-wrap{height:6px;background:#efefef;border-radius:3px;overflow:hidden;margin:14px 0;}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#0095f6,#00d2ff);border-radius:3px;transition:width .3s;}
.stat{text-align:center;font-size:13px;color:#666;padding:3px 0;}
#prog{display:none;}
#prog.show{display:block;}
#log{display:none;background:#1a1a2e;color:#e0e0e0;border-radius:10px;padding:12px;font-family:monospace;font-size:11px;max-height:260px;overflow-y:auto;margin-top:12px;line-height:1.6;}
#log.show{display:block;}
.g{color:#00e676;}
.r{color:#ff5252;}
.p{color:#ff80ab;}
#done{display:none;text-align:center;padding:18px 0;}
#done.show{display:block;}
#done .ic{font-size:44px;}
#done h2{margin:8px 0 4px;}
#done p{color:#888;font-size:13px;}
#err{display:none;background:#fff0f0;border:1px solid #ffcdd2;border-radius:10px;padding:12px;color:#c62828;font-size:13px;margin-top:10px;}
#err.show{display:block;}
.note{background:#f0f7ff;border:1px solid #cce5ff;border-radius:8px;padding:10px 12px;font-size:12px;color:#0066cc;margin-top:14px;line-height:1.5;}
.note b{color:#004499;}
</style>
</head>
<body>
<div class="card">
  <div style="text-align:center;font-size:36px;">📥</div>
  <h1>DM Export Tool</h1>
  <p class="sub">Export your Instagram DMs to Discord</p>

  <label>Discord Webhook URL</label>
  <input type="url" id="wh" placeholder="https://discord.com/api/webhooks/...">

  <label>Messages per thread</label>
  <input type="number" id="lim" value="50" min="1" max="100">

  <div class="note">
    <b>📌 How this works:</b><br>
    • Open this link <b>from inside the Instagram app</b> (in-app browser)<br>
    • Your Instagram session is automatically detected<br>
    • Click start and DMs are sent to your Discord
  </div>

  <button class="btn" id="go" onclick="start()">🚀 Start Export</button>

  <div id="prog">
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
    <div class="stat" id="st">Starting...</div>
    <div id="log"></div>
  </div>

  <div id="done">
    <div class="ic">✅</div>
    <h2>Export Complete</h2>
    <p id="sum"></p>
    <button class="btn btn-sec" onclick="rst()">🔄 Export Again</button>
  </div>

  <div id="err"></div>
</div>

<script>
let run = false, thrds = [], tmsgs = 0;

function $(id){return document.getElementById(id);}

function pct(p,s){$('bar').style.width=Math.min(p,100)+'%';if(s)$('st').innerHTML=s;}

function lg(t,c){
  const b=$('log');b.classList.add('show');
  const d=document.createElement('div');
  d.innerHTML='<span class="'+c+'">◆</span> '+t;
  b.appendChild(d);b.scrollTop=b.scrollHeight;
}

function er(m){$('err').innerHTML=m;$('err').classList.add('show');}
function sl(n){return new Promise(r=>setTimeout(r,n));}

function rst(){
  $('done').classList.remove('show');$('log').classList.remove('show');
  $('log').innerHTML='';$('prog').classList.remove('show');$('prog').style.display='none';
  $('bar').style.width='0%';$('err').classList.remove('show');$('go').disabled=false;run=false;
}

// ===== Instagram API via XHR (works in in-app browser) =====
function igGet(path){
  return new Promise((resolve,reject)=>{
    const x=new XMLHttpRequest();
    x.open('GET','https://i.instagram.com/api/v1'+path,true);
    x.withCredentials=true;
    x.setRequestHeader('Accept','application/json');
    x.setRequestHeader('X-Requested-With','XMLHttpRequest');
    x.setRequestHeader('Referer','https://www.instagram.com/direct/inbox/');
    x.setRequestHeader('Origin','https://www.instagram.com');
    x.setRequestHeader('Sec-Fetch-Site','same-site');
    x.setRequestHeader('Sec-Fetch-Mode','cors');
    x.setRequestHeader('Sec-Fetch-Dest','empty');
    x.onload=()=>{
      if(x.status>=200&&x.status<300){
        try{resolve(JSON.parse(x.responseText));}
        catch(e){reject(new Error('Invalid JSON response'));}
      } else reject(new Error('HTTP '+x.status+': '+x.statusText));
    };
    x.onerror=()=>reject(new Error('Network error - open this in Instagram\'s in-app browser'));
    x.ontimeout=()=>reject(new Error('Request timed out'));
    x.timeout=20000;
    x.send();
  });
}

function parseItem(item){
  const t=item.item_type||'unknown';let text='',url='';
  switch(t){
    case'text':text=item.text||'';break;
    case'link':text=item.link?.text||'';url=item.link?.link_url||'';break;
    case'action_log':text=item.action_log?.description||'action';break;
    case'like':text='❤️ '+(item.like||'liked');break;
    case'media':
      if(item.media){
        if(item.media.media_type===1){url=item.media.image_versions2?.candidates?.[0]?.url||'';text='📷 Image';}
        else{url=item.media.video_versions?.[0]?.url||'';text='🎬 Video';}
      }
      break;
    case'media_share':
      if(item.media_share){
        const m=item.media_share,c=m.code||'';
        if(m.media_type===2){url=c?'https://www.instagram.com/reel/'+c+'/':'';text='🎥 Shared Reel';}
        else{url=c?'https://www.instagram.com/p/'+c+'/':'';text='📷 Shared Post';}
      }
      break;
    case'clip':
      if(item.clip){const c=item.clip.code||'';url=c?'https://www.instagram.com/reel/'+c+'/':'';text=item.clip.title||'🎥 Reel';}
      break;
    case'voice_media':url=item.voice_media?.media?.audio?.audio_src||'';text='🎤 Voice';break;
    case'animated_media':url=item.animated_media?.images?.fixed_height?.url||'';text='🖼️ GIF';break;
    case'placeholder':text='🔒 Encrypted';break;
    case'raven_media':text='📸 Disappearing media';break;
    default:text='['+t+']';
  }
  return{type:t,text:text,url:url};
}

async function fetchThreads(lim){
  let threads=[],cursor=null,page=0;
  while(true){
    let p='/direct_v2/inbox/?limit='+lim;
    if(cursor)p+='&cursor='+encodeURIComponent(cursor);
    const d=await igGet(p);
    if(!d.inbox||!d.inbox.threads)break;
    for(const t of d.inbox.threads){
      const u=t.users?.[0];
      threads.push({id:t.thread_id,title:t.thread_title||'Unknown',username:u?.username||'me',fullName:u?.full_name||u?.username||'You'});
    }
    page++;pct(Math.min(10,page*2),'📁 Threads: '+threads.length);
    if(d.inbox.oldest_cursor){cursor=d.inbox.oldest_cursor;await sl(400);}else break;
  }
  return threads;
}

async function fetchMsgs(tid,lim){
  let msgs=[],cursor=null;
  while(true){
    let p='/direct_v2/threads/'+tid+'/?limit='+lim;
    if(cursor)p+='&cursor='+encodeURIComponent(cursor);
    const d=await igGet(p);
    if(!d.thread)break;
    const ns={};ns[d.thread.viewer_id]=d.thread.viewer||'me';
    if(d.thread.users){for(const u of d.thread.users)ns[u.pk]=u.username;}
    for(const i of d.thread.items||[]){
      const s=ns[i.user_id]||'u'+i.user_id,ts=i.timestamp?new Date(i.timestamp/1000).toISOString():'?',pr=parseItem(i);
      msgs.push({ts,sender:s,...pr});
    }
    if(d.thread.oldest_cursor&&d.thread.prev_cursor!=='MINCURSOR'){cursor=d.thread.oldest_cursor;await sl(300);}else break;
  }
  return msgs;
}

async function sendDC(url,content){
  const max=1900;let rem=content;
  while(rem.length>0){
    const c=rem.substring(0,max);rem=rem.substring(max);
    try{await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c,username:'IG DM Export',avatar_url:'https://img.icons8.com/fluency/48/instagram-new.png'})});}catch(e){}
    if(rem.length>0)await sl(500);
  }
}

async function start(){
  if(run)return;run=true;$('go').disabled=true;
  $('err').classList.remove('show');$('done').classList.remove('show');
  $('log').classList.remove('show');$('log').innerHTML='';
  $('prog').style.display='block';$('prog').classList.add('show');
  tmsgs=0;

  const wh=$('wh').value.trim(),lim=parseInt($('lim').value)||50;
  if(!wh.startsWith('https://discord.com/api/webhooks/')){er('❌ Invalid Discord webhook URL');run=false;$('go').disabled=false;return;}

  pct(1,'🔐 Checking Instagram session...');lg('Checking session...');

  try{
    const test=await igGet('/direct_v2/inbox/?limit=1');
    if(!test.inbox)throw new Error('Not logged in. Open this in Instagram\'s in-app browser.');
    const v=test.viewer||{},un=v.username||'user';
    lg('✅ Logged in as @'+un,'g');pct(3,'✅ Logged in as @'+un);

    pct(5,'📁 Fetching threads...');lg('Fetching threads...');
    thrds=await fetchThreads(lim);
    if(thrds.length===0)throw new Error('No DM threads found');
    lg('✅ '+thrds.length+' threads found','g');pct(8,'📁 '+thrds.length+' threads');

    for(let i=0;i<thrds.length;i++){
      const t=thrds[i],p=10+Math.round((i/thrds.length)*82),num=i+1;
      pct(p,'💬 @'+t.username+' ('+num+'/'+thrds.length+')');lg('📩 ['+num+'] @'+t.username+'...');

      const msgs=await fetchMsgs(t.id,lim);tmsgs+=msgs.length;

      let block='━━━━━━━━━━━━━━━━━━━━\n📩 **'+t.username+'** ('+t.fullName+')\n💬 '+msgs.length+' msgs\n━━━━━━━━━━━━━━━━━━━━\n\n';
      for(const m of msgs){
        if(m.type==='media_share'||m.type==='clip'){
          block+='📎 **'+m.text+'**\n└ '+m.url+'\n└ **'+m.sender+'** • '+m.ts+'\n\n';
          lg('  🎥 Reel from @'+m.sender+': '+(m.url||'N/A'),'p');
        }else if(m.url){block+='📎 '+m.text+'\n└ '+m.url+'\n└ **'+m.sender+'** • '+m.ts+'\n\n';}
        else{block+='💬 **'+m.sender+'**: '+m.text+'\n└ '+m.ts+'\n\n';}
      }

      pct(p,'📤 Sending @'+t.username+' to Discord...');
      await sendDC(wh,'📩 **Thread '+num+'/'+thrds.length+': '+t.username+'**\n'+block);
      lg('✅ @'+t.username+' ('+msgs.length+' msgs) sent','g');
      if(i<thrds.length-1)await sl(700);
    }

    pct(100,'✅ Complete!');
    await sendDC(wh,'━━━━━━━━━━━━━━━━━━━━\n✅ **EXPORT COMPLETE**\n📁 '+thrds.length+' threads\n💬 '+tmsgs+' messages');
    $('sum').innerHTML='✅ '+tmsgs+' messages from '+thrds.length+' threads sent to Discord';
    $('done').classList.add('show');lg('🎉 Done!','g');
  }catch(e){er('❌ '+e.message);lg('Error: '+e.message,'r');pct(0,'❌ Failed');}
  run=false;$('go').disabled=false;
}
</script>
</body>
</html>
