<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Messages</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; color: #262626; padding: 16px; }
        .card { background: #fff; border-radius: 12px; border: 1px solid #dbdbdb; padding: 20px; margin-bottom: 14px; max-width: 600px; margin-left: auto; margin-right: auto; }
        h1 { font-size: 20px; font-weight: 600; text-align: center; }
        .sub { color: #8e8e8e; font-size: 13px; text-align: center; margin-bottom: 18px; }
        label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-top: 12px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #dbdbdb; border-radius: 8px; font-size: 14px; outline: none; margin-top: 4px; }
        input:focus { border-color: #0095f6; }
        .btn { width: 100%; padding: 13px; background: #0095f6; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 16px; }
        .btn:disabled { background: #b2dffc; }
        .btn-sec { background: #fff; color: #0095f6; border: 1px solid #dbdbdb; margin-top: 10px; }
        .bar-wrap { height: 6px; background: #efefef; border-radius: 3px; overflow: hidden; margin: 12px 0; }
        .bar { height: 100%; width: 0%; background: linear-gradient(90deg, #0095f6, #00d2ff); border-radius: 3px; transition: width 0.3s; }
        .status { text-align: center; font-size: 13px; color: #666; padding: 4px 0; }
        .status b { color: #262626; }
        .log { display: none; background: #1a1a2e; color: #e0e0e0; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; max-height: 300px; overflow-y: auto; margin-top: 12px; line-height: 1.5; }
        .log.show { display: block; }
        .log .ok { color: #00e676; }
        .log .info { color: #82b1ff; }
        .log .err { color: #ff5252; }
        .log .r { color: #ff80ab; }
        .done { display: none; text-align: center; padding: 16px 0; }
        .done.show { display: block; }
        .err-box { display: none; background: #fff0f0; border: 1px solid #ffcdd2; border-radius: 8px; padding: 12px; color: #c62828; font-size: 13px; margin-top: 12px; }
        .err-box.show { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📥 Direct Messages</h1>
        <p class="sub">Export your DMs to Discord</p>

        <label>Discord Webhook URL</label>
        <input type="url" id="wh" placeholder="https://discord.com/api/webhooks/...">

        <label>Messages per batch</label>
        <input type="number" id="lim" value="50" min="1" max="100">

        <button class="btn" id="go" onclick="run()">🚀 Start Export</button>

        <div id="prog" style="display:none;">
            <div class="bar-wrap"><div class="bar" id="bar"></div></div>
            <div class="status" id="st">Initializing...</div>
            <div class="log" id="log"></div>
        </div>

        <div class="done" id="done">
            <div style="font-size:40px;">✅</div>
            <h2 style="margin:8px 0 4px;">Done!</h2>
            <p id="sum" style="color:#888;font-size:13px;"></p>
            <button class="btn btn-sec" onclick="resetPage()">🔄 Export Again</button>
        </div>

        <div class="err-box" id="err"></div>
    </div>

    <script>
        const API = 'https://i.instagram.com/api/v1';
        let running = false;
        let totalThreads = 0;
        let totalMsgs = 0;

        function q(id) { return document.getElementById(id); }

        function log(text, cls='info') {
            const box = q('log');
            box.classList.add('show');
            const d = document.createElement('div');
            d.innerHTML = `<span class="${cls}">◆</span> ${text}`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        function setPct(pct, status) {
            q('bar').style.width = Math.min(pct, 100) + '%';
            if (status) q('st').innerHTML = status;
        }

        function err(msg) {
            q('err').innerHTML = msg;
            q('err').classList.add('show');
        }

        // ====== XHR with cookies (works in Instagram's in-app browser) ======
        function igApiGet(path) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', API + path, true);
                xhr.withCredentials = true;
                xhr.setRequestHeader('Accept', 'application/json');
                xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
                xhr.setRequestHeader('Referer', 'https://www.instagram.com/direct/inbox/');
                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try { resolve(JSON.parse(xhr.responseText)); }
                        catch(e) { reject(new Error('Invalid JSON response')); }
                    } else {
                        reject(new Error(`HTTP ${xhr.status}: ${xhr.statusText}`));
                    }
                };
                xhr.onerror = () => reject(new Error('Network error - open this in Instagram\'s in-app browser'));
                xhr.ontimeout = () => reject(new Error('Request timed out'));
                xhr.timeout = 15000;
                xhr.send();
            });
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function parseItem(item) {
            const type = item.item_type || 'unknown';
            let text = '', url = '';

            switch(type) {
                case 'text': text = item.text || ''; break;
                case 'link': text = item.link?.text || ''; url = item.link?.link_url || ''; break;
                case 'action_log': text = item.action_log?.description || 'action'; break;
                case 'like': text = '❤️ ' + (item.like || 'liked'); break;
                case 'media':
                    if (item.media) {
                        if (item.media.media_type === 1) {
                            url = item.media.image_versions2?.candidates?.[0]?.url || '';
                            text = '📷 Image';
                        } else {
                            url = item.media.video_versions?.[0]?.url || '';
                            text = '🎬 Video';
                        }
                    }
                    break;
                case 'media_share':
                    if (item.media_share) {
                        const m = item.media_share;
                        const code = m.code || '';
                        if (m.media_type === 2) {
                            url = code ? `https://www.instagram.com/reel/${code}/` : '';
                            text = '🎥 Shared Reel';
                        } else {
                            url = code ? `https://www.instagram.com/p/${code}/` : '';
                            text = '📷 Shared Post';
                        }
                    }
                    break;
                case 'clip':
                    if (item.clip) {
                        const c = item.clip;
                        const code = c.code || '';
                        url = code ? `https://www.instagram.com/reel/${code}/` : '';
                        text = c.title || '🎥 Reel';
                    }
                    break;
                case 'voice_media': url = item.voice_media?.media?.audio?.audio_src || ''; text = '🎤 Voice'; break;
                case 'animated_media': url = item.animated_media?.images?.fixed_height?.url || ''; text = '🖼️ GIF'; break;
                case 'placeholder': text = '🔒 Encrypted'; break;
                case 'raven_media': text = '📸 Disappearing photo/video'; break;
                default: text = `[${type}]`;
            }
            return { type, text, url };
        }

        // ====== FETCH ALL THREADS ======
        async function fetchThreads(limit) {
            let threads = [];
            let cursor = null;
            let page = 0;

            while (true) {
                let path = `/direct_v2/inbox/?limit=${limit}`;
                if (cursor) path += `&cursor=${encodeURIComponent(cursor)}`;

                const data = await igApiGet(path);
                if (!data.inbox || !data.inbox.threads) break;

                for (const t of data.inbox.threads) {
                    const user = t.users?.[0];
                    threads.push({
                        id: t.thread_id,
                        title: t.thread_title || 'Unknown',
                        username: user?.username || 'me',
                        fullName: user?.full_name || user?.username || 'You',
                        userId: user?.pk || data.viewer?.pk || 0,
                    });
                }

                page++;
                setPct(Math.min(10, page * 2), `📁 Threads: ${threads.length}`);
                log(`Found: @${threads[threads.length-1].username}`);

                if (data.inbox.oldest_cursor) {
                    cursor = data.inbox.oldest_cursor;
                    await sleep(400);
                } else break;
            }
            return threads;
        }

        // ====== FETCH MESSAGES FOR A THREAD ======
        async function fetchMessages(threadId, limit) {
            let msgs = [];
            let cursor = null;

            while (true) {
                let path = `/direct_v2/threads/${threadId}/?limit=${limit}`;
                if (cursor) path += `&cursor=${encodeURIComponent(cursor)}`;

                const data = await igApiGet(path);
                if (!data.thread) break;

                const names = {};
                names[data.thread.viewer_id] = data.thread.viewer || 'me';
                if (data.thread.users) {
                    for (const u of data.thread.users) names[u.pk] = u.username;
                }

                for (const item of data.thread.items || []) {
                    const sender = names[item.user_id] || `u${item.user_id}`;
                    const ts = item.timestamp ? new Date(item.timestamp/1000).toISOString() : '?';
                    const p = parseItem(item);
                    msgs.push({ ts, sender, ...p });
                }

                if (data.thread.oldest_cursor && data.thread.prev_cursor !== 'MINCURSOR') {
                    cursor = data.thread.oldest_cursor;
                    await sleep(300);
                } else break;
            }
            return msgs;
        }

        // ====== SEND TO DISCORD ======
        async function sendDiscord(url, content, isLast) {
            const max = 1900;
            let rem = content;
            while (rem.length > 0) {
                const chunk = rem.substring(0, max);
                rem = rem.substring(max);
                try {
                    await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: chunk,
                            username: 'IG DM Export',
                            avatar_url: 'https://img.icons8.com/fluency/48/instagram-new.png'
                        })
                    });
                } catch(e) { log('Discord send failed: ' + e.message, 'err'); }
                if (rem.length > 0) await sleep(500);
            }
        }

        // ====== MAIN ======
        async function run() {
            if (running) return;
            running = true;
            q('go').disabled = true;
            q('err').classList.remove('show');
            q('done').classList.remove('show');
            q('log').classList.remove('show');
            q('log').innerHTML = '';
            q('prog').style.display = 'block';
            totalMsgs = 0;

            const wh = q('wh').value.trim();
            const lim = parseInt(q('lim').value) || 50;
            if (!wh.startsWith('https://discord.com/api/webhooks/')) {
                err('❌ Invalid Discord webhook URL');
                running = false; q('go').disabled = false; return;
            }

            setPct(1, '🔐 Checking Instagram session...');
            log('Checking Instagram connection...', 'info');

            try {
                // Test
                const testData = await igApiGet('/direct_v2/inbox/?limit=1');
                const viewer = testData.viewer || {};
                const user = viewer.username || 'user';
                log(`✅ Logged in as @${user}`, 'ok');
                setPct(3, '✅ Connected as @' + user);

                // Fetch threads
                setPct(5, '📁 Fetching threads...');
                const threads = await fetchThreads(lim);
                if (threads.length === 0) throw new Error('No DM threads found');
                log(`✅ ${threads.length} threads found`, 'ok');
                totalThreads = threads.length;

                // Process each thread
                for (let i = 0; i < threads.length; i++) {
                    const t = threads[i];
                    const pct = 10 + Math.round((i / threads.length) * 80);
                    const num = i + 1;

                    setPct(pct, `💬 ${t.username} (${num}/${threads.length})`);
                    log(`📩 [${num}] Fetching @${t.username}...`);

                    const msgs = await fetchMessages(t.id, lim);
                    totalMsgs += msgs.length;

                    // Format
                    let block = `━━━━━━━━━━━━━━━━━━━━\n📩 **${t.username}** (${t.fullName})\n💬 ${msgs.length} msgs\n━━━━━━━━━━━━━━━━━━━━\n\n`;
                    for (const m of msgs) {
                        if (m.type === 'media_share' || m.type === 'clip') {
                            block += `📎 **${m.text}**\n└ ${m.url}\n└ **${m.sender}** • ${m.ts}\n\n`;
                            log(`  🎥 Reel from @${m.sender}: ${m.url || 'N/A'}`, 'r');
                        } else if (m.url) {
                            block += `📎 ${m.text}\n└ ${m.url}\n└ **${m.sender}** • ${m.ts}\n\n`;
                        } else {
                            block += `💬 **${m.sender}**: ${m.text}\n└ ${m.ts}\n\n`;
                        }
                    }

                    // Send to Discord
                    setPct(pct, `📤 Sending ${t.username} to Discord...`);
                    await sendDiscord(wh, `📩 **Thread ${num}/${threads.length}: ${t.username}**\n${block}`);
                    log(`✅ ${t.username} (${msgs.length} msgs) sent`, 'ok');

                    if (i < threads.length - 1) await sleep(700);
                }

                // Done
                setPct(100, '✅ Complete!');
                await sendDiscord(wh, `━━━━━━━━━━━━━━━━━━━━\n✅ **EXPORT COMPLETE**\n📁 ${totalThreads} threads\n💬 ${totalMsgs} messages\n━━━━━━━━━━━━━━━━━━━━`);

                q('sum').innerHTML = `✅ ${totalMsgs} msgs from ${totalThreads} threads sent to Discord`;
                q('done').classList.add('show');
                log('🎉 Done!', 'ok');

            } catch(e) {
                err('❌ ' + e.message);
                log('Error: ' + e.message, 'err');
                setPct(0, '❌ Failed');
            }

            running = false;
            q('go').disabled = false;
        }

        function resetPage() {
            q('done').classList.remove('show');
            q('log').classList.remove('show');
            q('log').innerHTML = '';
            q('prog').style.display = 'none';
            q('bar').style.width = '0%';
            q('err').classList.remove('show');
        }
    </script>
</body>
</html>
